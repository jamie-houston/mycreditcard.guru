<div id="cardOwnershipModal" class="modal" style="display: none;">
    <div class="modal-content">
        <div class="modal-header">
            <h2 id="modalTitle">Add Card to Collection</h2>
            <span class="close" onclick="closeCardOwnershipModal()">&times;</span>
        </div>

        <!-- Local Storage Notice -->
        <div id="localStorageNotice" style="display: none; background: var(--accent-soft); border: 1px solid var(--accent); color: var(--text); padding: 12px 24px; margin: 0; border-radius: 0;">
            <div style="display: flex; align-items: center; gap: 8px;">
                <span class="ico" style="color:var(--accent);">smartphone</span>
                <span><strong>Local Mode:</strong> This card will be saved to your device. <a href="/accounts/login/" style="color: var(--accent); text-decoration: underline;">Log in</a> to sync with your account.</span>
            </div>
        </div>

        <form id="cardOwnershipForm" onsubmit="saveCardOwnership(event)">
            <div class="form-group">
                <label for="nickname">Nickname (Optional)</label>
                <input type="text" id="nickname" name="nickname"
                       placeholder="e.g., My Travel Card, Grocery Card">
                <small>Give this card a memorable name</small>
            </div>

            <!-- Phase K: owner selector — shown only for authed households
                 with more than one entity of this card's own kind (personal
                 vs. business). See openCardOwnershipModal(). -->
            <div class="form-group" id="cardOwnershipOwnerGroup" style="display: none;">
                <label for="ownershipOwner">Held By</label>
                <select id="ownershipOwner" name="owner"></select>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="opened_date">Opened Date</label>
                    <input type="date" id="opened_date" name="opened_date">
                    <small>When did you get approved/open this card?</small>
                </div>

                <div class="form-group">
                    <label for="closed_date">Closed Date (Optional)</label>
                    <input type="date" id="closed_date" name="closed_date">
                    <small>Leave blank if card is still active</small>
                </div>
            </div>

            <div class="form-group">
                <label for="notes">Notes (Optional)</label>
                <textarea id="notes" name="notes" rows="3"
                          placeholder="Any notes about this card (signup bonus received, annual fee paid, etc.)"></textarea>
            </div>

            <div class="form-actions">
                <button type="button" onclick="closeCardOwnershipModal()" class="btn-secondary">
                    Cancel
                </button>
                <button type="submit" class="btn-primary">
                    Add Card
                </button>
            </div>
        </form>
    </div>
</div>
